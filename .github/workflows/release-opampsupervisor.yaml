name: Release OpAMP supervisor

on:
  push:
    tags: ["cx-opampsupervisor/v*"]

permissions:
  contents: read

jobs:
  release:
    name: Release OpAMP supervisor
    uses: ./.github/workflows/base-binary-release.yaml
    with:
      binary: opampsupervisor
      collector-dependency: 'coralogix/opentelemetry-collector-contrib'
      dependency-target-folder: '.contrib'
      windows-msi: true
    secrets: inherit
    permissions: write-all
